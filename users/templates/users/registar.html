{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Registo" %} | Protege+</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;1,900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'users/css/registar.css' %}">
    <link rel="stylesheet" href="{% static 'css/acessibilidade.css' %}">
</head>

<body class="view-autenticacao {% if user.is_authenticated %}{{ user.perfil.filtro_daltonismo }} {{ user.perfil.filtro_contraste }}{% endif %}" data-authenticated="{{ user.is_authenticated|lower }}">

    <header class="header-navegacao-login">
        <a href="{% url 'home' %}" class="logotipo-superior">
            <div class="emblema-marca">🛡️</div>
            <span class="nome-marca-estilizado">Protege+</span>
        </a>

        <a href="javascript:history.back()" class="btn-exit-login">
            <span>←</span> {% trans "Voltar" %}
        </a>
    </header>

    <div id="content-wrapper">
        <div class="wrapper-split">
            <aside class="ala-lateral-esquerda">
                <a href="{% url 'home' %}" class="link-logotipo">
                    <div class="emblema-marca">🛡️</div>
                    <span class="nome-marca-estilizado">Protege+</span>
                </a>
                
                <div class="zona-personagem">
                    <img src="{% static 'users/images/avatar_perfil.png' %}" alt="Protege+" class="img-personagem">
                </div>
                <div></div> 
            </aside>

            <main class="ala-principal-direita">
                <div class="modulo-login">
                    <h2 class="cabecalho-form">
                        {% trans "Regista-te e experimenta!" %}
                    </h2>

                    <div class="stepper-container">
                        <div id="dot1" class="step-dot active"></div>
                        <div id="line1" class="step-line"></div>
                        <div id="dot2" class="step-dot"></div>
                        <div id="line2" class="step-line"></div>
                        <div id="dot3" class="step-dot"></div>
                    </div>

                    <form method="POST" id="registoForm">
                        {% csrf_token %}

                        <div id="step1">
                            <div class="agrupamento-input">
                                <label class="etiqueta-input">{% trans "Email:" %}</label>
                                <input type="email" name="email" required placeholder="Endereço de email" class="caixa-texto-protege" autofocus>
                            </div>
                            <div class="agrupamento-input">
                                <label class="etiqueta-input">{% trans "Nome da instituição:" %}</label>
                                <input type="text" name="instituicao" required placeholder="Nome da tua escola" class="caixa-texto-protege">
                            </div>
                            <button type="button" onclick="goToStep(2)" class="botao-acao-principal">{% trans "Seguinte" %}</button>
                        </div>

                        <div id="step2" class="hidden">
                            <div class="agrupamento-input">
                                <label class="etiqueta-input">{% trans "Idade:" %}</label>
                                <input type="number" name="idade" required placeholder="A tua idade" class="caixa-texto-protege">
                            </div>
                            <div class="agrupamento-input">
                                <label class="etiqueta-input">{% trans "Ano letivo:" %}</label>
                                <input type="text" name="ano_letivo" required placeholder="Ex: 10º Ano" class="caixa-texto-protege">
                            </div>
                            <div class="btn-flex">
                                <button type="button" onclick="goToStep(1)" class="btn-voltar-step">{% trans "Voltar" %}</button>
                                <button type="button" onclick="goToStep(3)" class="botao-acao-principal" style="flex: 2;">{% trans "Seguinte" %}</button>
                            </div>
                        </div>

                        <div id="step3" class="hidden">
                            <div class="agrupamento-input">
                                <label class="etiqueta-input">{% trans "Nome de utilizador:" %}</label>
                                <input type="text" name="username" required placeholder="Como te queres chamar?" class="caixa-texto-protege">
                            </div>
                            <div class="agrupamento-input">
                                <label class="etiqueta-input">{% trans "Palavra-passe:" %}</label>
                                <input type="password" name="password" required placeholder="Cria uma senha" class="caixa-texto-protege">
                            </div>
                            <div class="agrupamento-input">
                                <label class="etiqueta-input">{% trans "Repetir palavra-passe:" %}</label>
                                <input type="password" name="confirm_password" required placeholder="Repete a senha" class="caixa-texto-protege">
                            </div>
                            <div class="btn-flex">
                                <button type="button" onclick="goToStep(2)" class="btn-voltar-step">{% trans "Voltar" %}</button>
                                <button type="submit" class="botao-acao-principal" style="flex: 2;">{% trans "Finalizar" %}</button>
                            </div>
                        </div>
                    </form>
                    
                </div>
            </main>
        </div>
    </div>

    {% include 'partials/footer_acessibilidade.html' %}

    <script src="{% static 'js/scripts.js' %}"></script>
</body>
</html>
